// Central IDL for Limeros — hand-maintained.
// Fed to coder/ for C++ and Rust code generation via Tera templates.
// source: message.proto
syntax = "proto3";
package msgs;



message UdpMessage { 
  uint32 dst = 1; // logic destination, e.g. "motor", "camera", "ps4", "hoverboard" 
  uint32 src = 2; // logic source, e.g. "controller", "sensor", "app"
  uint32 msg_typ = 3;
  uint32 req_id = 4; // for request/reply matching, 0 if not a request/reply
  bytes payload = 5;
}

message BrokerAnnouncement  {
  // source ip, dst,src
  string src_ip = 1; // source ip, e.g. "
}

message DeviceAliveEvent {
  string device_id = 1; // unique device id, e.g. "esp32_ebcd8f"
  repeated string objects = 2; // objects that are alive, e.g. "motor", "camera", "ps4", "hoverboard"
  repeated string subscribes = 3; // topics that broker will send
  repeated string publishes = 4; // publishes on these topics
  repeated string requests = 5; // requests thqt will be answered by device
  repeated string replies = 6; // request/reply
}     

message BrokerSubscribeRequest {
  string src_str = 1; // source string, e.g. "controller", "sensor", "app"
  string dst_str = 2; // destination string, e.g. "motor", "camera", "ps4", "hoverboard"
  string msg_typ_str = 3; // message type string, e.g. "motor_cmd", "camera_request", "ps4_event", "hoverboard_event"
  uint32  src_id = 4; // source id, e.g. 1, 2, 3
  uint32  dst_id = 5; // destination id, e.g. 1
  uint32  msg_typ_id = 6; // message type id, e.g. 1, 2, 3
}

message BrokerUnsubscribeRequest {
  string src_str = 1; // source string, e.g. "controller", "sensor", "app"
  string dst_str = 2; // destination string, e.g. "motor", "camera", "ps4", "hoverboard"
  string msg_typ_str = 3; // message type string, e.g. "motor_cmd", "camera_request", "ps4_event", "hoverboard_event"
  uint32  src_id = 4; // source id, e.g. 1, 2, 3
  uint32  dst_id = 5; // destination id, e.g. 1
  uint32  msg_typ_id = 6; // message type id, e.g. 1, 2, 3
}

message BrokerSubscribeReply {
  int32 rc = 1; // return code, 0=ok, <0=error
  string message = 2; // error message if rc<0
}

message BrokerEvent {
  uint64 messages_routed = 1;
  uint64 messages_dropped= 2;
  uint32 dictionary_size = 3;
  uint32 subscription_count = 4;
  uint32 endpoint_count = 5;
  uint64 uptime_secs = 6;
}

message BrokerRequest {
  string add_word = 1; // add word to dictionary
}

enum LogLevel {
  DEBUG = 1;
  INFO = 2;
  WARN = 3;
  ERROR = 4;
  FATAL = 5;
  ALERT = 6;
}

message LogEvent {
  LogLevel level = 2;
  string message = 3;
  int32 error_code = 4;
  string file = 5;
  int32 line = 6;
  uint64 timestamp = 7;
}

message SysRequest {
  uint32 req_id = 0;
  uint64 set_time = 1;
  bool reboot = 2;
  string console = 3;
}

message SysReply {
  uint32 req_id = 0;
  int32 rc=1;
  string message =2;
}

message SysEvent {
  uint64 utc = 1;
  uint64 uptime = 2;
  uint64 free_heap = 3;
  uint64 flash = 4;
  string cpu_board = 5;
  string build_date = 6;
}

message WifiEvent {
  string ssid = 2;
  string bssid = 3;
  int32 rssi = 4;
  string ip = 5;
  string mac = 6;
  int32 channel = 7;
  string gateway = 8;
  string netmask = 9;
}

message MulticastEvent {
  string group = 2;
  int32 port = 3;
  uint32 mtu = 4;
}

enum MessageType {
  SYS_CMD = 1;
  SYS_INFO = 2;
  WIFI_INFO = 3;
  MOTOR_INFO = 4;
  MOTOR_CMD = 5;
}

enum Toggle {
  OFF = 0;
  ON = 1;
}

enum CtrlMod {
  VOLTAGE = 1;
  SPEED = 2;
  TORQUE = 3;
}
enum CtrlTyp {
  COMMUTATION = 0;
  SINUSOIDAL = 1;
  FOC = 2;
}

enum InTyp {
  DISABLED = 0;
  NORMAL_POT = 1;
  MIDDLE_RESTING_POT = 2;
  AUTO_DETECT = 3;
}

message PingRequest {
  uint32 req_id = 0;
  uint32 number = 1;
}

message PingReply {
  uint32 req_id = 0;
  uint32 number = 1;
}

message HoverboardEventRaw {
  int32 ctrl_mod = 0; // 1:Voltage 2:Speed 3:Torque
  int32 ctrl_typ = 1; // 0:Commutation 1:Sinusoidal 2:FOC
  int32 cur_mot_max = 2; // Max phase current A
  int32 rpm_mot_max = 3; // Max motor RPM
  int32 fi_weak_ena = 4; // Enable field weak 0:OFF 1:ON
  int32 fi_weak_hi = 5; // Field weak high RPM
  int32 fi_weak_lo = 6; // Field weak low RPM
  int32 fi_weak_max = 7; // Field weak max current A (FOC only)
  int32 phase_adv_max_deg = 8; // Max Phase Adv angle Deg (SIN only)
  int32 input1_raw = 9; // Input1 raw value
  int32 input1_typ = 10; // Input1 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 input1_min = 11; // Input1 minimum value
  int32 input1_mid = 12; // Input1 middle value
  int32 input1_max = 13; // Input1 maximum value
  int32 input1_cmd = 14; // Input1 command value
  int32 input2_raw = 15; // Input2 raw value
  int32 input2_typ = 16; // Input2 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 input2_min = 17; // Input2 minimum value
  int32 input2_mid = 18; // Input2 middle value
  int32 input2_max = 19; // Input2 maximum value
  int32 input2_cmd = 20; // Input2 command value
  int32 aux_input1_raw = 21; // Input1 raw value
  int32 aux_input1_typ = 22; // Input1 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 aux_input1_min = 23; // Input1 minimum value
  int32 aux_input1_mid = 24; // Input1 middle value
  int32 aux_input1_max = 25; // Input1 maximum value
  int32 aux_input1_cmd = 26; // Input1 command value
  int32 aux_input2_raw = 27; // Input2 raw value
  int32 aux_input2_typ = 28; // Input2 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 aux_input2_min = 29; // Input2 minimum value
  int32 aux_input2_mid = 30; // Input2 middle value
  int32 aux_input2_max = 31; // Input2 maximum value
  int32 aux_input2_cmd = 32; // Input2 command value
  int32 dc_curr = 33; // Total DC Link current A *100
  int32 rdc_curr = 34; // Right DC Link current A *100
  int32 ldc_curr = 35; // Left DC Link current A *100
  int32 cmdl = 36; // Left Motor Command RPM
  int32 cmdr = 37; // Right Motor Command RPM
  int32 spd_avg = 38; // Motor Measured Avg RPM
  int32 spdl = 39; // Left Motor Measured RPM
  int32 spdr = 40; // Right Motor Measured RPM
  int32 filter_rate = 41; // Rate *10
  int32 spd_coef = 42; // Speed Coefficient *10
  int32 str_coef = 43; // Steer Coefficient *10
  int32 batv = 44; // Calibrated Battery Voltage *100
  int32 temp = 45; // Calibrated Temperature °C *10
}


// Hoverboard Message

message HoverboardEvent {
  int32 ctrl_mod = 1; // 1:Voltage 2:Speed 3:Torque
  int32 ctrl_typ = 2; // 0:Commutation 1:Sinusoidal 2:FOC
  int32 cur_mot_max = 3; // Max phase current A
  int32 rpm_mot_max = 4; // Max motor RPM
  int32 fi_weak_ena = 5; // Enable field weak 0:OFF 1:ON
  int32 fi_weak_hi = 6; // Field weak high RPM
  int32 fi_weak_lo = 7; // Field weak low RPM
  int32 fi_weak_max = 8; // Field weak max current A (FOC only)
  int32 phase_adv_max_deg = 9; // Max Phase Adv angle Deg (SIN only)
  int32 input1_raw = 10; // Input1 raw value
  int32 input1_typ = 11; // Input1 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 input1_min = 12; // Input1 minimum value
  int32 input1_mid = 13; // Input1 middle value
  int32 input1_max = 14; // Input1 maximum value
  int32 input1_cmd = 15; // Input1 command value
  int32 input2_raw = 16; // Input2 raw value
  int32 input2_typ = 17; // Input2 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 input2_min = 18; // Input2 minimum value
  int32 input2_mid = 19; // Input2 middle value
  int32 input2_max = 20; // Input2 maximum value
  int32 input2_cmd = 21; // Input2 command value
  int32 aux_input1_raw = 22; // Input1 raw value
  int32 aux_input1_typ = 23; // Input1 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 aux_input1_min = 24; // Input1 minimum value
  int32 aux_input1_mid = 25; // Input1 middle value
  int32 aux_input1_max = 26; // Input1 maximum value
  int32 aux_input1_cmd = 27; // Input1 command value
  int32 aux_input2_raw = 28; // Input2 raw value
  int32 aux_input2_typ = 29; // Input2 type 0:Disabled, 1:Normal Pot, 2:Middle Resting Pot, 3:Auto-detect
  int32 aux_input2_min = 30; // Input2 minimum value
  int32 aux_input2_mid = 31; // Input2 middle value
  int32 aux_input2_max = 32; // Input2 maximum value
  int32 aux_input2_cmd = 33; // Input2 command value
  float dc_curr = 34; // Total DC Link current A *100
  float rdc_curr = 35; // Right DC Link current A *100
  float ldc_curr = 36; // Left DC Link current A *100
  int32 cmdl = 37; // Left Motor Command RPM
  int32 cmdr = 38; // Right Motor Command RPM
  int32 spd_avg = 39; // Motor Measured Avg RPM
  int32 spdl = 40; // Left Motor Measured RPM
  int32 spdr = 41; // Right Motor Measured RPM
  int32 filter_rate = 42; // Rate *10
  int32 spd_coef = 43; // Speed Coefficient *10
  int32 str_coef = 44; // Steer Coefficient *10
  float batv = 45; // Calibrated Battery Voltage *100
  float temp = 46; // Calibrated Temperature °C *10
}

message HoverboardRequest {
  uint32 req_id = 0;
  int32 speed = 1;
  int32 steer = 2;
}

message HoverboardReply {
  uint32 req_id = 0;
  int32 error_code = 1;
  string message = 2;
}

// PS4 Controller Message

message TouchPoint {
  bool active = 4;
  int32 id = 1;
  int32 x = 2;
  int32 y = 3;
}

message Ps4Event {
  bool button_left = 1;
  bool button_right = 2;
  bool button_up = 3;
  bool button_down = 4;

  bool button_square = 5;
  bool button_cross = 6;
  bool button_circle = 7;
  bool button_triangle = 8;

  bool button_left_shoulder = 9;
  bool button_right_shoulder = 10;

  bool button_left_trigger = 11;
  bool button_right_trigger = 12;

  bool button_left_joystick = 13;
  bool button_right_joystick = 14;

  bool button_share = 15;
  bool button_options = 16;
  bool button_touchpad = 33;
  bool button_ps = 34;

  int32 axis_lx = 17;
  int32 axis_ly = 18;
  int32 axis_rx = 19;
  int32 axis_ry = 20;

  int32 gyro_x = 21;
  int32 gyro_y = 22;
  int32 gyro_z = 23;
  int32 accel_x = 24;
  int32 accel_y = 25;
  int32 accel_z = 26;

  bool connected = 27;
  int32 battery_level = 28;
  // repeated TouchPoint touch_points = 29;
  bool bluetooth = 30;
  string debug = 31;
  int32 temp = 32;
}

message Ps4Request {
  uint32 req_id = 0;
  int32 rumble_small = 1;
  int32 rumble_large = 2;
  int32 led_red = 3;
  int32 led_green = 4;
  int32 led_blue = 5;
  int32 led_flash_on = 6;
  int32 led_flash_off = 7;
}

message CameraEvent {
  int32 width = 1;
  int32 height = 2;
  string format = 3;
  bytes data = 4;
  bool led = 5;
  int32 quality = 6;
}

message CameraRequest {
  uint32 req_id = 0;
  bool led = 1;
  string capture_tcp_destination = 2;
  int32 quality = 4;
}

message CameraReply {
  uint32 req_id = 0;
  int32 error_code = 1;
  string message = 2;
  bytes data = 3;
}

// Lawnmower Manual Events

enum LawnmowerMode {
  MANUAL = 0;
  AUTO = 1;
  PAUSED = 2;
  EMERGENCY_STOP = 3;
}

message LawnmowerManualEvent {
  int32 speed = 1;
  int32 steering = 2;
  bool blade = 3;
}

message LawnmowerManualRequest {
  uint32 req_id = 0;
  float speed = 1;
  float steer = 2;
  bool blade = 3;
  bool start_manual_control = 4;
  bool stop_manual_control = 5;
  bool emergency_stop = 6;
  bool start_auto_mode = 7;
  bool stop_auto_mode = 8;
}

message LawnmowerManualReply {
  uint32 req_id = 0;
  int32 error_code = 1;
  string message = 2;
}

message LawnmowerAutoEvent {
  bool started = 1;
  bool stopped = 2;
  bool paused = 3;
  bool resumed = 4;
  string mode = 5;
  string path = 6;
}

message LawnmowerAutoRequest {
  uint32 req_id = 0;
  bool start = 1;
  bool stop = 2;
  bool pause = 3;
  bool resume = 4;
  string mode = 5;
  string path = 6;
}

message LawnmowerStatus {
  int32 battery_level = 1;
  bool blade_status = 2;
  string current_mode = 3;
  string error_message = 4;
}

message MotorEvent {
  int32 motor_id = 1;
  float temperature = 2;
  float voltage = 3;
  float current = 4;
  float speed = 5;
  float position = 6;
}

// MAX31855 Thermocouple Sensor Message

message Max31855Event {
  float thermocouple_c = 1;
  float internal_c = 2;
  bool fault = 3;
  bool open_circuit = 4;
  bool short_to_gnd = 5;
  bool short_to_vcc = 6;
  uint64 timestamp_ms = 7;
}

// Heating Controller Message

message HeatingRequest {
  uint32 req_id = 0;
  float setpoint_c = 1;
  bool enabled = 2;
  float kp = 3;
  float ki = 4;
  float kd = 5;
  bool reset_integral = 6;
}

message HeatingEvent {
  float temperature_c = 1;
  float setpoint_c = 2;
  float output_pct = 3;
  bool enabled = 4;
  bool heater_on = 5;
  bool fault = 6;
  uint64 timestamp_ms = 7;
}